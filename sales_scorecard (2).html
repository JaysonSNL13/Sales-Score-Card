<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#1a1d26" />
<title>Sales Scorecard — Store Dashboard</title>
<link rel="icon" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=" />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --ink:#1a1d26;--ink-2:#2c303d;
  --paper:#ffffff;--paper-2:#f7f7f8;--paper-3:#eef0f3;
  --line:#e3e5ea;--muted:#6b7280;--muted-2:#9aa0ac;
  --radius:14px;--radius-sm:10px;
  --tap:56px;--tap-lg:64px;
  --gutter:16px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  /* Sales Scorecard palette — B&W per the canonical mock */
  --sc-ink:#0a0a0a;
  --sc-line:#ededed;
  --sc-line-2:#d9dde5;
  --sc-bg:#fafafa;
  --sc-muted:#888;
  --sc-muted-2:#555;
  --sc-gold:#c9a73a;
}
html,body{height:100%;overscroll-behavior-y:contain}
body{font-family:'Montserrat',-apple-system,BlinkMacSystemFont,sans-serif;font-size:15px;line-height:1.4;color:var(--ink);background:var(--paper-2);-webkit-font-smoothing:antialiased}
button{font:inherit;color:inherit;cursor:pointer;border:none;background:none}
input,select{font:inherit;color:inherit}

.app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--paper-2);position:relative;display:flex;flex-direction:column}

/* ===== HEADER (matches existing dashboard) ===== */
.hdr{position:sticky;top:0;z-index:50;background:var(--ink);color:var(--paper);padding:calc(var(--safe-top) + 10px) var(--gutter) 10px}
.hdr-row{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.hdr-menu{width:44px;height:44px;border-radius:12px;background:rgba(255,255,255,.08);display:grid;place-items:center;flex:0 0 auto}
.hdr-menu:active{background:rgba(255,255,255,.16)}
.hdr-title{flex:1;font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:3px;line-height:1;min-width:0}
.hdr-title small{display:block;font-family:'Montserrat',sans-serif;font-size:.56rem;letter-spacing:2px;font-weight:600;opacity:.55;margin-top:4px;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-user{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.12);display:grid;place-items:center;font-family:'Bebas Neue',sans-serif;font-size:.95rem;letter-spacing:1px;flex:0 0 auto}

/* Tab bar (sub-header pages) */
.tabs{display:flex;gap:6px;padding:0 var(--gutter) 10px;background:var(--ink);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;padding:8px 14px;border-radius:999px;background:rgba(255,255,255,.07);color:rgba(255,255,255,.7);font-size:.7rem;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;white-space:nowrap}
.tab.active{background:var(--paper);color:var(--ink)}

/* ===== DRAWER (simplified — matches parent dashboard pattern) ===== */
.scrim{position:fixed;inset:0;z-index:200;background:rgba(26,29,38,.55);opacity:0;pointer-events:none;transition:opacity .25s}
.scrim.show{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;left:0;bottom:0;width:min(86vw,320px);max-width:320px;background:var(--paper);z-index:250;transform:translateX(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;box-shadow:4px 0 24px rgba(0,0,0,.12)}
.drawer.show{transform:translateX(0)}
.drawer-hdr{background:var(--ink);color:var(--paper);padding:calc(var(--safe-top) + 18px) 18px 18px}
.drawer-brand{font-family:'Bebas Neue',sans-serif;font-size:1.35rem;letter-spacing:3px;line-height:1}
.drawer-brand small{display:block;font-size:.55rem;letter-spacing:2px;font-weight:700;opacity:.55;margin-top:4px;text-transform:uppercase;font-family:'Montserrat',sans-serif}
.drawer-nav{flex:1;overflow-y:auto;padding:12px 10px 24px}
.nav-section{font-size:.58rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--muted-2);padding:14px 14px 6px}
.nav-item{width:100%;display:flex;align-items:center;gap:12px;padding:14px;border-radius:var(--radius-sm);font-size:.9rem;font-weight:600;color:var(--ink);text-align:left;transition:background .12s}
.nav-item:active{background:var(--paper-3)}
.nav-item.active{background:var(--ink);color:var(--paper)}
.nav-icon{width:22px;height:22px;flex:0 0 auto}

/* ===== PAGE BODY ===== */
.page{padding:var(--gutter) var(--gutter) calc(var(--safe-bottom) + 24px)}

/* ===== SALES SCORECARD PANEL (matches canonical B&W mock) ===== */
.sc-panel{background:#fff;border:1px solid var(--sc-line-2);border-radius:6px;overflow:hidden}

/* Panel head — black banner */
.sc-head{background:var(--sc-ink);color:#fff;padding:14px 16px;display:flex;flex-direction:column;gap:4px}
.sc-head-title{font-size:12.5px;font-weight:700;letter-spacing:1.4px}
.sc-head-shop{font-size:11.5px;color:#d4d4d4;font-weight:500;letter-spacing:.4px}
.sc-head-sub{font-size:10.5px;color:#888;font-style:italic;margin-top:2px}

/* Filter row */
.sc-filter{background:var(--sc-bg);border-bottom:1px solid var(--sc-line);padding:12px 14px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;position:relative}
.sc-pill{background:#fff;border:1px solid var(--sc-line-2);border-radius:20px;padding:7px 12px;font-size:11.5px;font-weight:500;color:#333;cursor:pointer;display:inline-flex;align-items:center;gap:6px;line-height:1;min-height:30px;font-family:inherit}
.sc-pill:active{background:var(--sc-bg)}
.sc-pill.active{background:var(--sc-ink);color:#fff;border-color:var(--sc-ink)}
.sc-pill .caret{font-size:8px;opacity:.6;margin-left:1px}
.sc-pill.subtle{background:var(--sc-bg);border-style:dashed;color:#666}
.sc-pill.subtle.active{background:var(--sc-ink);color:#fff;border-style:solid}
.sc-refresh{margin-left:auto;font-size:10.5px;color:var(--sc-muted);font-style:italic;padding:4px 0}

/* Period progress strip */
.sc-period{background:#fff;padding:12px 16px;border-bottom:1px solid var(--sc-line);display:flex;justify-content:space-between;align-items:center;gap:14px}
.sc-period-info{font-size:11.5px;color:var(--sc-muted-2);min-width:0;flex:1}
.sc-period-info strong{color:var(--sc-ink);font-weight:700}
.sc-progress-track{flex:0 0 110px;height:4px;background:var(--sc-line);border-radius:2px;overflow:hidden}
.sc-progress-fill{height:100%;background:var(--sc-ink);transition:width .25s}

/* Metric grid — 2x2 on mobile to fit 480px */
.sc-metrics{display:grid;grid-template-columns:1fr 1fr;gap:0}
.sc-metric{padding:16px 14px;border-right:1px solid var(--sc-line);border-bottom:1px solid var(--sc-line);background:#fff}
.sc-metric:nth-child(2n){border-right:none}
.sc-metric:nth-last-child(-n+2){border-bottom:none}
.sc-m-name{font-size:9.5px;font-weight:700;color:var(--sc-muted-2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;line-height:1.2;min-height:22px}
.sc-m-weight{font-size:9px;color:var(--sc-muted);font-weight:600;letter-spacing:.4px;margin-left:4px}
.sc-m-value{font-size:30px;font-weight:800;color:var(--sc-ink);line-height:1;font-family:'Montserrat',sans-serif}
.sc-m-value.dim{color:var(--sc-muted);font-size:24px}
.sc-m-delta{font-size:10.5px;font-weight:600;color:var(--sc-muted-2);margin-top:6px;letter-spacing:.2px}
.sc-m-delta .arrow{font-weight:700;margin-right:2px}
.sc-m-best{font-size:10.5px;color:#666;margin-top:14px;padding-top:10px;border-top:1px solid var(--sc-line)}
.sc-m-best .label{color:var(--sc-muted-2);font-weight:700;letter-spacing:.3px;text-transform:uppercase;font-size:9px;display:block;margin-bottom:2px}
.sc-m-best .value{color:var(--sc-ink);font-weight:700;font-size:11.5px}
.sc-m-best .shop{color:var(--sc-muted);font-style:italic;font-size:10px;margin-left:4px}

/* Total Score banner */
.sc-total{background:var(--sc-ink);color:#fff;padding:18px 18px;display:flex;justify-content:space-between;align-items:center;gap:14px}
.sc-total-left{display:flex;align-items:center;gap:16px;min-width:0;flex:1}
.sc-total-label-block{line-height:1.2;min-width:0}
.sc-total-label{font-size:10px;color:#999;text-transform:uppercase;letter-spacing:1.2px;font-weight:700}
.sc-total-goal{font-size:10.5px;color:#888;font-style:italic;margin-top:2px}
.sc-total-value{font-size:42px;font-weight:800;color:#fff;line-height:1;font-family:'Montserrat',sans-serif}
.sc-total-delta{font-size:11px;font-weight:700;padding:3px 8px;border-radius:10px;background:rgba(255,255,255,.12);color:#fff;white-space:nowrap}
.sc-total-right{text-align:right;font-size:10.5px;color:#aaa;line-height:1.45;flex:0 0 auto}
.sc-total-right strong{color:#fff;font-weight:700}

/* Focus block */
.sc-focus{background:var(--sc-bg);border-top:1px solid var(--sc-line);padding:14px 16px;display:flex;gap:12px;align-items:flex-start}
.sc-focus-icon{font-size:16px;line-height:1;margin-top:1px;color:var(--sc-gold);flex:0 0 auto}
.sc-focus-body{flex:1;min-width:0}
.sc-focus-label{font-size:9.5px;font-weight:700;color:var(--sc-ink);text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px}
.sc-focus-headline{font-size:13px;font-weight:700;color:var(--sc-ink);margin-bottom:4px;line-height:1.3}
.sc-focus-action{font-size:11.5px;color:var(--sc-muted-2);line-height:1.5}
.sc-focus-action strong{color:var(--sc-ink)}

/* Methodology footer */
.sc-foot{background:var(--sc-bg);border-top:1px solid var(--sc-line);padding:10px 14px;font-size:10px;color:var(--sc-muted);text-align:center;line-height:1.5}
.sc-foot strong{color:var(--sc-muted-2)}

/* Loading / empty states */
.sc-loading{padding:60px 24px;text-align:center;color:var(--sc-muted);font-size:13px}
.sc-loading .spinner{width:32px;height:32px;border:3px solid var(--sc-line);border-top-color:var(--sc-ink);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.sc-empty{padding:50px 30px;text-align:center;color:var(--sc-muted);font-size:12.5px;line-height:1.5}
.sc-empty strong{color:var(--sc-ink);display:block;margin-bottom:6px;font-size:13px}

/* ===== POPOVERS (preset menu, calendar, comparison) ===== */
.sc-pop{position:absolute;background:#fff;border:1px solid var(--sc-line-2);border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,.18);z-index:100;min-width:200px;max-width:calc(100vw - 32px);overflow:hidden}
.sc-pop-item{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;font-size:12.5px;color:var(--sc-ink);cursor:pointer;border-bottom:1px solid var(--sc-line);font-weight:500}
.sc-pop-item:last-child{border-bottom:none}
.sc-pop-item:active{background:var(--sc-bg)}
.sc-pop-item.active{background:var(--sc-ink);color:#fff;font-weight:600}
.sc-pop-item .check{opacity:0;font-size:11px}
.sc-pop-item.active .check{opacity:1}

/* Calendar */
.sc-cal{padding:14px}
.sc-cal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;font-size:13px;font-weight:700;color:var(--sc-ink)}
.sc-cal-nav{width:28px;height:28px;border-radius:6px;display:grid;place-items:center;background:var(--sc-bg);font-size:14px}
.sc-cal-nav:active{background:var(--sc-line)}
.sc-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;font-size:11px}
.sc-cal-dow{text-align:center;padding:4px 0;color:var(--sc-muted);font-weight:700;font-size:9.5px;text-transform:uppercase;letter-spacing:.5px}
.sc-cal-day{aspect-ratio:1;display:grid;place-items:center;border-radius:6px;cursor:pointer;color:var(--sc-ink);font-weight:500}
.sc-cal-day:active{background:var(--sc-bg)}
.sc-cal-day.muted{color:#ccc}
.sc-cal-day.in-range{background:var(--sc-bg)}
.sc-cal-day.range-end{background:var(--sc-ink);color:#fff;font-weight:700}
.sc-cal-day.disabled{color:#ddd;pointer-events:none}
.sc-cal-actions{display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--sc-line)}
.sc-cal-btn{flex:1;padding:9px;border-radius:8px;font-size:11.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.sc-cal-btn.primary{background:var(--sc-ink);color:#fff}
.sc-cal-btn.primary:disabled{opacity:.4}
.sc-cal-btn.secondary{background:var(--sc-bg);color:var(--sc-ink)}

/* Settings overlay (config the Google Sheet URL + shop) */
.sc-cfg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:none;align-items:flex-end;justify-content:center}
.sc-cfg.show{display:flex}
.sc-cfg-card{background:#fff;width:100%;max-width:480px;border-radius:14px 14px 0 0;padding:20px 18px calc(var(--safe-bottom) + 20px);max-height:80vh;overflow-y:auto}
.sc-cfg-title{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:2px;margin-bottom:4px}
.sc-cfg-sub{font-size:11px;color:var(--muted);margin-bottom:18px}
.sc-cfg-field{margin-bottom:14px}
.sc-cfg-field label{display:block;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:6px}
.sc-cfg-field input,.sc-cfg-field select{width:100%;height:44px;border:1.5px solid var(--line);border-radius:10px;padding:0 12px;font-size:13px;background:var(--paper-2);outline:none}
.sc-cfg-field input:focus,.sc-cfg-field select:focus{border-color:var(--ink);background:#fff}
.sc-cfg-actions{display:flex;gap:8px;margin-top:18px}
.sc-cfg-btn{flex:1;height:48px;border-radius:10px;font-weight:700;font-size:12px;letter-spacing:1.5px;text-transform:uppercase}
.sc-cfg-btn.primary{background:var(--ink);color:#fff}
.sc-cfg-btn.secondary{background:var(--paper-2);color:var(--ink)}
.sc-cfg-mode{display:flex;gap:6px;margin-bottom:16px;background:var(--paper-2);padding:4px;border-radius:10px}
.sc-cfg-mode button{flex:1;padding:10px 8px;border-radius:7px;font-size:10.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
.sc-cfg-mode button.active{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.08)}

/* Footer banner — methodology / data source */
.sc-source{margin-top:14px;padding:12px 14px;background:#fff;border:1px solid var(--sc-line);border-left:3px solid var(--sc-ink);font-size:11px;color:var(--sc-muted-2);line-height:1.55;border-radius:4px}
.sc-source strong{color:var(--sc-ink)}
.sc-source a{color:var(--sc-ink);text-decoration:underline;font-weight:600}
</style>
</head>
<body>

<div class="app">

  <!-- Header (matches existing dashboard chrome) -->
  <header class="hdr">
    <div class="hdr-row">
      <button class="hdr-menu" onclick="openDrawer()" aria-label="Menu">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="hdr-title">
        <span id="hdr-shop-name">DEDHAM, MA</span>
        <small id="hdr-shop-sub">Store Dashboard</small>
      </div>
      <div class="hdr-user" id="hdr-user-initial">DM</div>
    </div>
    <div class="tabs" role="tablist">
      <button class="tab" data-page="ops">Ops</button>
      <button class="tab active" data-page="sales">Sales</button>
      <button class="tab" data-page="inventory">Inventory</button>
      <button class="tab" data-page="schedule">Schedule</button>
    </div>
  </header>

  <!-- Page body -->
  <main class="page">

    <!-- ============ SALES SCORECARD PANEL ============ -->
    <section class="sc-panel" id="sc-panel">
      <!-- Loading state shown initially; replaced once data loads -->
      <div class="sc-loading" id="sc-initial-loading">
        <div class="spinner"></div>
        <div>Loading scorecard…</div>
      </div>
    </section>

    <div class="sc-source">
      <strong>Data source.</strong>
      <span id="sc-source-text">Demo mode — bundled April 2026 sample. Tap the gear in the panel header to connect a Google Sheet for live data.</span>
    </div>

  </main>
</div>

<!-- Drawer (matches existing pattern) -->
<div class="scrim" id="scrim" onclick="closeDrawer()"></div>
<aside class="drawer" id="drawer" aria-label="Navigation">
  <div class="drawer-hdr">
    <div class="drawer-brand">STATE &amp; LIBERTY<small>Store Dashboard</small></div>
  </div>
  <nav class="drawer-nav">
    <div class="nav-section">Pages</div>
    <button class="nav-item" data-page="ops">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Operations
    </button>
    <button class="nav-item active" data-page="sales">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
      Sales Scorecard
    </button>
    <button class="nav-item" data-page="inventory">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.7l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.7l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
      Inventory
    </button>
    <button class="nav-item" data-page="schedule">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Schedule
    </button>
  </nav>
</aside>

<!-- Settings overlay -->
<div class="sc-cfg" id="sc-cfg" onclick="if(event.target===this)closeCfg()">
  <div class="sc-cfg-card">
    <div class="sc-cfg-title">SALES SCORECARD SETTINGS</div>
    <div class="sc-cfg-sub">Data source and shop selection</div>

    <div class="sc-cfg-mode">
      <button id="mode-demo" onclick="setMode('demo')">Demo Data</button>
      <button id="mode-live" onclick="setMode('live')">Live Sheet</button>
    </div>

    <div class="sc-cfg-field" id="cfg-url-field">
      <label>Google Sheet — Published CSV URL</label>
      <input type="text" id="cfg-url" placeholder="https://docs.google.com/spreadsheets/d/…/pub?output=csv" />
    </div>

    <div class="sc-cfg-field">
      <label>This store</label>
      <select id="cfg-shop"></select>
    </div>

    <div class="sc-cfg-actions">
      <button class="sc-cfg-btn secondary" onclick="closeCfg()">Cancel</button>
      <button class="sc-cfg-btn primary" onclick="saveCfg()">Save &amp; Refresh</button>
    </div>
  </div>
</div>

<script>
/* ============================================================
   CONFIG — edit these for production deployment
   ============================================================ */

/* DEFAULT_SHEET_URL: leave empty to start in demo mode.
   Paste the Google Sheet's "Publish to web → CSV" URL when ready. */
const DEFAULT_SHEET_URL = "";

/* Bundled-demo-data: inlined here so the HTML works when opened directly (file://).

/* Returns ISO date string (YYYY-MM-DD) for "today" in America/New_York. */
function todayInEastern() {
  /* Intl gives us the EST date components no matter where the browser is. */
  const parts = new Intl.DateTimeFormat("en-CA", {
    timeZone: "America/New_York",
    year: "numeric", month: "2-digit", day: "2-digit"
  }).formatToParts(new Date());
  const get = k => parts.find(p => p.type === k).value;
  return `${get("year")}-${get("month")}-${get("day")}`;
}

  if (params.get("shop")) state.shop = params.get("shop");
  if (params.get("url")) { state.sheetUrl = params.get("url"); state.mode = "live"; }
  else if (DEFAULT_SHEET_URL) { state.sheetUrl = DEFAULT_SHEET_URL; state.mode = "live"; }

  /* Restore from localStorage if present */
  try {
    const saved = JSON.parse(localStorage.getItem("sc_cfg") || "{}");
    if (saved.shop) state.shop = saved.shop;
    if (saved.mode) state.mode = saved.mode;
    if (saved.sheetUrl) state.sheetUrl = saved.sheetUrl;
  } catch(e) {}

  /* In live mode, "today" = today in EST. Demo mode stays pinned to 2026-04-19. */
  if (state.mode === "live") state.today = todayInEastern();

  /* Default range = MTD */
  applyPreset("MTD");
  loadData();
});

    } else {

async function loadDemo() {

async function loadLive(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error("Sheet fetch failed (HTTP " + res.status + "). Check the URL is published to web as CSV.");
  const csv = await res.text();
  state.invoices = parseShopifyCsv(csv);
}

/* Parse the raw Shopify CSV → invoice-level rows.
   Tolerant of minor format variation (column order, date formats). */
function parseShopifyCsv(csv) {
  const rows = parseCsv(csv);
  if (rows.length < 2) throw new Error("Sheet appears empty");
  const head = rows[0].map(h => h.trim());
  const ix = {
    order: head.indexOf("Order name"),
    day: head.indexOf("Day"),
    ptype: head.indexOf("Product type"),
    sku: head.indexOf("Product variant SKU"),
    net: head.indexOf("Net sales"),
    bp: head.indexOf("BP POS LOC")
  };
  if (Object.values(ix).some(v => v < 0)) {
    throw new Error("CSV missing one of: Order name, Day, Product type, Product variant SKU, Net sales, BP POS LOC");
  }
  const invMap = new Map();
  for (let i = 1; i < rows.length; i++) {
    const r = rows[i];
    if (r.length <= ix.bp) continue;
    const bp = (r[ix.bp] || "").trim();
    if (!bp || bp === "#N/A") continue;
    const ptype = (r[ix.ptype] || "").trim();
    if (EXCLUDED_PRODUCT_TYPES.has(ptype)) continue;
    const day = (r[ix.day] || "").trim();
    const iso = toIsoDate(day);
    if (!iso) continue;
    let net = parseFloat(r[ix.net]) || 0;
    if (CANADIAN_BP.has(bp)) net *= CAD_USD;
    const key = (r[ix.order] || "").trim() + "|" + bp;
    let inv = invMap.get(key);
    if (!inv) {
      inv = {date: iso, shop: bp, has_blazer:false, has_pant:false, has_shirt:false, has_acc:false, net:0};
      invMap.set(key, inv);
    }
    inv.net += net;
    const b = bucket(ptype, r[ix.sku] || "");
    if (b === "blazer") inv.has_blazer = true;
    else if (b === "pant") inv.has_pant = true;
    else if (b === "shirt") inv.has_shirt = true;
    else if (b === "acc") inv.has_acc = true;
  }
  /* Drop returns/refunds: invoices with net ≤ 0 that don't touch a scored bucket.
     Without this, AOV gets pulled down by return-only invoices. */
  const invoices = Array.from(invMap.values());
  return invoices.filter(inv => !(inv.net <= 0 && !inv.has_blazer && !inv.has_pant && !inv.has_shirt && !inv.has_acc));
}

function bucket(ptype, sku) {
  const s = (sku || "").toUpperCase();
  if (ptype === "Suit" && s.startsWith("SL-BLAZER")) return "blazer";
  if (ptype === "Pants" && (s.startsWith("SL-PANT-") || s.startsWith("SL-SUITPANT"))) return "pant";
  if (ptype === "Shirt" && s.startsWith("SL-DS")) return "shirt";
  if (ptype === "Classic Fit" && s.startsWith("SL-CLASSIC")) return "shirt";
  if (ACCESSORY_TYPES.has(ptype)) return "acc";
  return null;
}

function toIsoDate(s) {
  if (!s) return null;
  /* Try YYYY-MM-DD first */
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  /* Try M/D/YYYY */
  const m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (m) {
    const mm = String(+m[1]).padStart(2,"0");
    const dd = String(+m[2]).padStart(2,"0");
    return m[3] + "-" + mm + "-" + dd;
  }
  return null;
}

/* Tiny CSV parser — handles quoted fields with embedded commas/quotes */
function parseCsv(text) {
  const rows = [];
  let cur = [], field = "", inQ = false, i = 0;
  while (i < text.length) {
    const c = text[i];
    if (inQ) {
      if (c === '"') {
        if (text[i+1] === '"') { field += '"'; i += 2; continue; }
        inQ = false; i++; continue;
      }
      field += c; i++; continue;
    }
    if (c === '"') { inQ = true; i++; continue; }
    if (c === ",") { cur.push(field); field = ""; i++; continue; }
    if (c === "\n") { cur.push(field); rows.push(cur); cur = []; field = ""; i++; continue; }
    if (c === "\r") { i++; continue; }
    field += c; i++;
  }
  if (field.length || cur.length) { cur.push(field); rows.push(cur); }
  return rows;
}

/* ============================================================
   METRIC COMPUTATION
   ============================================================ */

function computeMetricsForShop(invoices, shop, startISO, endISO) {
  const inRange = invoices.filter(i => i.shop === shop && i.date >= startISO && i.date <= endISO);
  const stats = {invoices: inRange.length, blazer:0, pant:0, suitComponent:0, fullSuit:0,
                 blazerWithShirt:0, blazerWithAcc:0, netSales:0};
  for (const inv of inRange) {
    if (inv.has_blazer) stats.blazer++;
    if (inv.has_pant) stats.pant++;
    if (inv.has_blazer || inv.has_pant) stats.suitComponent++;
    if (inv.has_blazer && inv.has_pant) stats.fullSuit++;
    if (inv.has_blazer && inv.has_shirt) stats.blazerWithShirt++;
    if (inv.has_blazer && inv.has_acc) stats.blazerWithAcc++;
    stats.netSales += inv.net;
  }
  const m = {
    suitComp:   stats.suitComponent ? 100 * stats.fullSuit / stats.suitComponent : null,
    shirtToSuit:stats.blazer ? 100 * stats.blazerWithShirt / stats.blazer : null,
    accToSuit:  stats.blazer ? 100 * stats.blazerWithAcc / stats.blazer : null,
    aov:        stats.invoices ? stats.netSales / stats.invoices : null,
    _stats:     stats
  };
  return m;
}

function computeTierBest(invoices, tier, startISO, endISO, excludeShop) {
  /* Returns: {suitComp:{val,shop}, shirtToSuit:{val,shop}, accToSuit:{val,shop}, aov:{val,shop}} */
  const tierShops = Object.keys(TIER_MAP).filter(s => TIER_MAP[s] === tier);
  const best = {
    suitComp:    {val:null, shop:null},
    shirtToSuit: {val:null, shop:null},
    accToSuit:   {val:null, shop:null},
    aov:         {val:null, shop:null}
  };
  for (const s of tierShops) {
    const m = computeMetricsForShop(invoices, s, startISO, endISO);
    /* Rate metrics: require ≥ floor blazer invoices */
    if (m._stats.blazer >= TIER_BEST_FLOORS.rate) {
      if (m._stats.suitComponent >= TIER_BEST_FLOORS.rate && m.suitComp !== null && (best.suitComp.val === null || m.suitComp > best.suitComp.val)) {
        best.suitComp = {val:m.suitComp, shop:s};
      }
      if (m.shirtToSuit !== null && (best.shirtToSuit.val === null || m.shirtToSuit > best.shirtToSuit.val)) {
        best.shirtToSuit = {val:m.shirtToSuit, shop:s};
      }
      if (m.accToSuit !== null && (best.accToSuit.val === null || m.accToSuit > best.accToSuit.val)) {
        best.accToSuit = {val:m.accToSuit, shop:s};
      }
    }
    /* AOV: require ≥ floor total invoices */
    if (m._stats.invoices >= TIER_BEST_FLOORS.aov && m.aov !== null) {
      if (best.aov.val === null || m.aov > best.aov.val) {
        best.aov = {val:m.aov, shop:s};
      }
    }
  }
  return best;
}

function computeTotalScore(metrics, tierBest) {
  /* For each metric where shop has a value AND tierBest is non-null:
     grade = min(100, shopVal / tierBestVal × 100)
     Otherwise: skip that metric and renormalize weights. */
  const parts = [
    {key:"suitComp",    w:WEIGHTS.suitComp},
    {key:"shirtToSuit", w:WEIGHTS.shirtToSuit},
    {key:"accToSuit",   w:WEIGHTS.accToSuit},
    {key:"aov",         w:WEIGHTS.aov}
  ];
  let totalW = 0, weighted = 0, usedKeys = [];
  for (const p of parts) {
    const shopV = metrics[p.key];
    const bestV = tierBest[p.key].val;
    if (shopV === null || bestV === null || bestV === 0) continue;
    const grade = Math.min(100, (shopV / bestV) * 100);
    weighted += grade * p.w;
    totalW += p.w;
    usedKeys.push(p.key);
  }
  if (totalW === 0) return {score:null, usedKeys};
  return {score: weighted / totalW, usedKeys};
}

function computeRankInTier(invoices, shop, tier, startISO, endISO) {
  const tierShops = Object.keys(TIER_MAP).filter(s => TIER_MAP[s] === tier);
  const tierBest = computeTierBest(invoices, tier, startISO, endISO, null);
  const scored = tierShops.map(s => {
    const m = computeMetricsForShop(invoices, s, startISO, endISO);
    return {shop:s, score: computeTotalScore(m, tierBest).score};
  }).filter(x => x.score !== null);
  scored.sort((a,b) => b.score - a.score);
  const rank = scored.findIndex(x => x.shop === shop);
  return {rank: rank >= 0 ? rank + 1 : null, of: scored.length, leader: scored[0] || null};
}

/* ============================================================
   PRESETS / DATE RANGES
   ============================================================ */

function todayDate() { return new Date(state.today + "T00:00:00"); }

function fmtIso(d) {
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}

function shiftDays(d, n) {
  const r = new Date(d); r.setDate(r.getDate() + n); return r;
}

function applyPreset(preset) {
  state.preset = preset;
  const today = todayDate();
  let start, end;
  switch (preset) {
    case "Today":         start = today; end = today; break;
    case "Yesterday":     start = end = shiftDays(today, -1); break;
    case "Last 7 days":   start = shiftDays(today, -6); end = today; break;
    case "Last 30 days":  start = shiftDays(today, -29); end = today; break;
    case "MTD":
      start = new Date(today.getFullYear(), today.getMonth(), 1);
      end = today;
      break;
    case "Last Month":
      start = new Date(today.getFullYear(), today.getMonth()-1, 1);
      end = new Date(today.getFullYear(), today.getMonth(), 0); /* last day of prev month */
      break;
    default:
      /* Custom — don't change range */
      return;
  }
  state.range = {start: fmtIso(start), end: fmtIso(end)};
}

function comparePeriod(preset, startISO, endISO) {
  /* Returns {start, end} for the comparison window, per the brief's rules */
  const s = new Date(startISO + "T00:00:00");
  const e = new Date(endISO + "T00:00:00");
  if (preset === "Today" || preset === "Yesterday") {
    const pd = shiftDays(s, -1);
    return {start: fmtIso(pd), end: fmtIso(pd)};
  }
  if (preset === "MTD") {
    /* Same DAY-OF-MONTH range in the previous month */
    const pStart = new Date(s.getFullYear(), s.getMonth()-1, 1);
    const pEnd = new Date(s.getFullYear(), s.getMonth()-1, e.getDate());
    return {start: fmtIso(pStart), end: fmtIso(pEnd)};
  }
  if (preset === "Last Month") {
    const pStart = new Date(s.getFullYear(), s.getMonth()-1, 1);
    const pEnd = new Date(s.getFullYear(), s.getMonth(), 0);
    return {start: fmtIso(pStart), end: fmtIso(pEnd)};
  }
  /* Last 7 / Last 30 / Custom → same-length window immediately before */
  const days = Math.round((e - s) / 86400000) + 1;
  const pEnd = shiftDays(s, -1);
  const pStart = shiftDays(pEnd, -(days - 1));
  return {start: fmtIso(pStart), end: fmtIso(pEnd)};
}

function comparePeriodLabel(preset, range) {
  if (preset === "Today") return "vs yesterday";
  if (preset === "Yesterday") return "vs prev day";
  if (preset === "MTD") {
    const s = new Date(range.start + "T00:00:00");
    return "vs " + MONTHS_SHORT[(s.getMonth()+11)%12];
  }
  if (preset === "Last Month") {
    const s = new Date(range.start + "T00:00:00");
    return "vs " + MONTHS_SHORT[(s.getMonth()+11)%12];
  }
  if (preset === "Last 7 days") return "vs prev 7";
  if (preset === "Last 30 days") return "vs prev 30";
  return "vs prev period";
}

function renderPeriodStrip(range) {
  /* Only show day-X-of-month for MTD */
  if (state.preset !== "MTD") {
    const days = daysBetween(range.start, range.end) + 1;
    return `<div class="sc-period">
      <div class="sc-period-info"><strong>${days} day${days===1?"":"s"}</strong> · ${formatRangeFull(range)}</div>
    </div>`;
  }
  const end = new Date(range.end + "T00:00:00");
  const dayOfMonth = end.getDate();
  const daysInMonth = new Date(end.getFullYear(), end.getMonth()+1, 0).getDate();
  const pct = Math.round(100 * dayOfMonth / daysInMonth);
  return `<div class="sc-period">
    <div class="sc-period-info"><strong>Day ${dayOfMonth} of ${daysInMonth}</strong> · ${pct}% through ${MONTHS_FULL[end.getMonth()]}</div>
    <div class="sc-progress-track"><div class="sc-progress-fill" style="width:${pct}%"></div></div>
  </div>`;
}

function renderMetric(name, weight, value, best, compValue, compLabel, deltaUnit, valUnit) {
  const valStr = formatMetricValue(value, valUnit);
  const dimmed = value === null;
  let deltaHtml = "";
  if (state.compareOn && value !== null) {
    if (compValue === null || compValue === undefined) {
      deltaHtml = `<div class="sc-m-delta" style="opacity:.6"><span class="arrow">—</span>no prior data</div>`;
    } else {
      const diff = value - compValue;
      let arrow = "—", txt;
      if (Math.abs(diff) < (valUnit === "$" ? 0.5 : 0.5)) {
        arrow = "—"; txt = "flat " + compLabel;
      } else if (diff > 0) {
        arrow = "↑"; txt = "+" + formatDelta(diff, valUnit, deltaUnit) + " " + compLabel;
      } else {
        arrow = "↓"; txt = formatDelta(diff, valUnit, deltaUnit) + " " + compLabel;
      }
      deltaHtml = `<div class="sc-m-delta"><span class="arrow">${arrow}</span>${escapeHtml(txt)}</div>`;
    }
  }
  let bestHtml = "";
  if (best.val !== null) {
    bestHtml = `<div class="sc-m-best">
      <span class="label">Tier best</span>
      <span class="value">${formatMetricValue(best.val, valUnit)}</span>
      <span class="shop">${escapeHtml(SHOP_DISPLAY[best.shop] || best.shop)}</span>
    </div>`;
  } else {
    bestHtml = `<div class="sc-m-best">
      <span class="label">Tier best</span>
      <span class="value">—</span>
      <span class="shop">insufficient data</span>
    </div>`;
  }
  return `<div class="sc-metric">
    <div class="sc-m-name">${escapeHtml(name)}<span class="sc-m-weight">${weight}</span></div>
    <div class="sc-m-value ${dimmed ? 'dim' : ''}">${valStr}</div>
    ${deltaHtml}
    ${bestHtml}
  </div>`;
}

function renderTotalScore(totalScore, compTotalScore, compLabel, rankInfo) {
  const scoreStr = totalScore.score === null ? "—" : Math.round(totalScore.score) + "%";
  let deltaHtml = "";
  if (state.compareOn && compTotalScore && compTotalScore.score !== null && totalScore.score !== null) {
    const diff = totalScore.score - compTotalScore.score;
    let arrow = "—", txt;
    if (Math.abs(diff) < 0.5) { arrow="—"; txt="flat " + compLabel; }
    else if (diff > 0) { arrow="↑"; txt="+" + Math.round(diff) + " " + compLabel; }
    else { arrow="↓"; txt=Math.round(diff) + " " + compLabel; }
    deltaHtml = `<div class="sc-total-delta">${arrow} ${escapeHtml(txt)}</div>`;
  }
  let rightHtml = "";
  if (rankInfo.rank !== null) {
    const leaderName = rankInfo.leader ? (SHOP_DISPLAY[rankInfo.leader.shop] || rankInfo.leader.shop) : "—";
    const leaderScore = rankInfo.leader ? Math.round(rankInfo.leader.score) + "%" : "—";
    rightHtml = `<strong>Rank in Tier:</strong> #${rankInfo.rank} of ${rankInfo.of}<br>${rankInfo.rank === 1 ? "You lead the tier" : escapeHtml(leaderName.split(",")[0]) + " leads at " + leaderScore}`;
  } else {
    rightHtml = `<strong>Rank:</strong> —`;
  }
  return `<div class="sc-total">
    <div class="sc-total-left">
      <div class="sc-total-label-block">
        <div class="sc-total-label">Total Score</div>
        <div class="sc-total-goal">Goal: 100%</div>
      </div>
      <div class="sc-total-value">${scoreStr}</div>
      ${deltaHtml}
    </div>
    <div class="sc-total-right">${rightHtml}</div>
  </div>`;
}

function renderFocus(metrics, tierBest, totalScore) {
  /* Pick the metric with the biggest gap-to-tier-best, weighted by its weight in Total Score */
  const candidates = [
    {key:"suitComp",    name:"Suit Completion",    w:WEIGHTS.suitComp,    unit:"%"},
    {key:"shirtToSuit", name:"Shirt-to-Suit",      w:WEIGHTS.shirtToSuit, unit:"%"},
    {key:"accToSuit",   name:"Accessory-to-Suit",  w:WEIGHTS.accToSuit,   unit:"%"},
    {key:"aov",         name:"AOV",                w:WEIGHTS.aov,         unit:"$"}
  ];
  let pick = null, bestImpact = -1;
  for (const c of candidates) {
    const v = metrics[c.key], b = tierBest[c.key].val;
    if (v === null || b === null || b === 0 || v >= b) continue;
    const gapPct = (b - v) / b;            /* proportional gap */
    const impact = gapPct * c.w * 100;     /* approximate points-of-total-score available */
    if (impact > bestImpact) { bestImpact = impact; pick = {...c, val:v, best:b, bestShop:tierBest[c.key].shop, impact}; }
  }
  if (!pick) {
    /* No gap → either no data or already leading */
    if (totalScore.score === null) {
      return `<div class="sc-focus">
        <div class="sc-focus-icon">★</div>
        <div class="sc-focus-body">
          <div class="sc-focus-label">No data this period</div>
          <div class="sc-focus-action">Pick a longer date range to see your scorecard, or check back once invoices land.</div>
        </div>
      </div>`;
    }
    return `<div class="sc-focus">
      <div class="sc-focus-icon">★</div>
      <div class="sc-focus-body">
        <div class="sc-focus-label">You're leading the tier</div>
        <div class="sc-focus-action">No metric is below tier best. Keep pushing — every category leader sets the bar for the rest.</div>
      </div>
    </div>`;
  }
  const valStr = formatMetricValue(pick.val, pick.unit);
  const bestStr = formatMetricValue(pick.best, pick.unit);
  const gap = pick.unit === "$"
    ? "$" + Math.round(pick.best - pick.val)
    : Math.round(pick.best - pick.val) + "-point";
  const advice = focusAdvice(pick.key);
  return `<div class="sc-focus">
    <div class="sc-focus-icon">★</div>
    <div class="sc-focus-body">
      <div class="sc-focus-label">Focus area</div>
      <div class="sc-focus-headline">${escapeHtml(pick.name)} — biggest gap to your tier leader</div>
      <div class="sc-focus-action">
        You're at <strong>${valStr}</strong>; ${escapeHtml(SHOP_DISPLAY[pick.bestShop] || pick.bestShop)} leads the tier at <strong>${bestStr}</strong>. That's a ${gap} gap. ${advice} Closing this gap is worth ~${Math.round(pick.impact)} points of Total Score.
      </div>
    </div>
  </div>`;
}

function focusAdvice(key) {
  switch (key) {
    case "suitComp":    return "Push the pair when the customer is already in the fitting — once the blazer fits, the matching pant is a low-friction add.";
    case "shirtToSuit": return "Bring a shirt into every blazer fitting before the customer hits the mirror — most shirts sell themselves when seen on.";
    case "accToSuit":   return "Layer accessories into every suit fitting: tie or pocket square when the blazer comes out, shoes once the look is together.";
    case "aov":         return "Trade-up the blazer fabric, layer in a second piece, and present the shirt + accessory at the mirror — that's where AOV lives.";
    default:            return "";
  }
}

/* ============================================================
   FORMATTING HELPERS
   ============================================================ */

function formatMetricValue(v, unit) {
  if (v === null || v === undefined) return "—";
  if (unit === "$") return "$" + Math.round(v).toLocaleString();
  return Math.round(v) + "%";
}

function formatDelta(diff, valUnit, deltaUnit) {
  if (valUnit === "$") return "$" + Math.round(Math.abs(diff));
  return Math.round(Math.abs(diff)) + "pp";
}

function formatRangePill(range) {
  const s = new Date(range.start + "T00:00:00");
  const e = new Date(range.end + "T00:00:00");
  if (range.start === range.end) {
    return MONTHS_SHORT[s.getMonth()] + " " + s.getDate() + ", " + s.getFullYear();
  }
  const sameYear = s.getFullYear() === e.getFullYear();
  const sameMonth = sameYear && s.getMonth() === e.getMonth();
  if (sameMonth) {
    return MONTHS_SHORT[s.getMonth()] + " " + s.getDate() + "–" + e.getDate() + ", " + s.getFullYear();
  }
  if (sameYear) {
    return MONTHS_SHORT[s.getMonth()] + " " + s.getDate() + " – " + MONTHS_SHORT[e.getMonth()] + " " + e.getDate() + ", " + s.getFullYear();
  }
  return MONTHS_SHORT[s.getMonth()] + " " + s.getDate() + ", " + s.getFullYear() + " – " + MONTHS_SHORT[e.getMonth()] + " " + e.getDate() + ", " + e.getFullYear();
}

function formatRangeFull(range) { return formatRangePill(range); }

function formatTime(d) {
  let h = d.getHours();
  const m = String(d.getMinutes()).padStart(2,"0");
  const ap = h >= 12 ? "PM" : "AM";
  h = h % 12; if (h === 0) h = 12;
  return h + ":" + m + " " + ap;
}

function daysBetween(aISO, bISO) {
  return Math.round((new Date(bISO+"T00:00:00") - new Date(aISO+"T00:00:00")) / 86400000);
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

/* ============================================================
   POPOVERS (preset, calendar)
   ============================================================ */

function closePop() {
  document.querySelectorAll(".sc-pop").forEach(p => p.remove());
  state.popover = null;
}

function openPop(kind, anchor) {
  if (state.popover === kind) { closePop(); return; }
  closePop();
  state.popover = kind;
  let html = "";
  if (kind === "preset") {
    const opts = ["Today","Yesterday","Last 7 days","Last 30 days","MTD","Last Month","Custom range"];
    html = opts.map(o =>
      `<div class="sc-pop-item ${o === state.preset ? 'active' : ''}" onclick="pickPreset('${o}')">${o}<span class="check">✓</span></div>`
    ).join("");
  } else if (kind === "calendar") {
    html = renderCalendar();
  }
  const pop = document.createElement("div");
  pop.className = "sc-pop";
  pop.innerHTML = html;
  const filter = anchor.closest(".sc-filter");
  filter.appendChild(pop);
  /* Position below the anchor */
  const aRect = anchor.getBoundingClientRect();
  const fRect = filter.getBoundingClientRect();
  pop.style.top = (aRect.bottom - fRect.top + 6) + "px";
  pop.style.left = Math.max(0, Math.min(aRect.left - fRect.left, fRect.width - 240)) + "px";
  /* Click-outside to close */
  setTimeout(() => {
    const off = (e) => {
      if (!pop.contains(e.target) && e.target !== anchor && !anchor.contains(e.target)) {
        closePop();
        document.removeEventListener("click", off);
      }
    };
    document.addEventListener("click", off);
  }, 0);
}

function pickPreset(p) {
  if (p === "Custom range") {
    closePop();
    setTimeout(() => openPop("calendar", document.getElementById("pill-range")), 50);
    return;
  }
  applyPreset(p);
  closePop();
  render();
}

function toggleCompare() {
  state.compareOn = !state.compareOn;
  closePop();
  render();
}

/* CALENDAR */
function renderCalendar() {
  if (!state.calendarCursor) {
    const s = new Date(state.range.start + "T00:00:00");
    state.calendarCursor = {y:s.getFullYear(), m:s.getMonth()};
  }
  if (!state.calendarPick.start) {
    state.calendarPick = {start: state.range.start, end: state.range.end};
  }
  const cur = state.calendarCursor;
  const first = new Date(cur.y, cur.m, 1);
  const dim = new Date(cur.y, cur.m+1, 0).getDate();
  const startDow = first.getDay();
  let cells = "";
  /* DOW header */
  for (const d of DOW_SHORT) cells += `<div class="sc-cal-dow">${d}</div>`;
  /* Leading blanks */
  for (let i = 0; i < startDow; i++) cells += `<div></div>`;
  for (let d = 1; d <= dim; d++) {
    const iso = cur.y + "-" + String(cur.m+1).padStart(2,"0") + "-" + String(d).padStart(2,"0");
    const classes = ["sc-cal-day"];
    const {start, end} = state.calendarPick;
    if (iso === start || iso === end) classes.push("range-end");
    else if (start && end && iso > start && iso < end) classes.push("in-range");
    if (iso > state.today) classes.push("disabled");
    cells += `<div class="${classes.join(" ")}" data-iso="${iso}" onclick="calPick('${iso}')">${d}</div>`;
  }
  const monthLabel = MONTHS_FULL[cur.m] + " " + cur.y;
  return `<div class="sc-cal">
    <div class="sc-cal-hdr">
      <button class="sc-cal-nav" onclick="calNav(-1)">‹</button>
      <span>${monthLabel}</span>
      <button class="sc-cal-nav" onclick="calNav(1)">›</button>
    </div>
    <div class="sc-cal-grid">${cells}</div>
    <div class="sc-cal-actions">
      <button class="sc-cal-btn secondary" onclick="closePop()">Cancel</button>
      <button class="sc-cal-btn primary" id="cal-apply" ${state.calendarPick.start && state.calendarPick.end ? "" : "disabled"} onclick="calApply()">Apply</button>
    </div>
  </div>`;
}

function calNav(delta) {
  const cur = state.calendarCursor;
  let m = cur.m + delta, y = cur.y;
  while (m < 0) { m += 12; y--; }
  while (m > 11) { m -= 12; y++; }
  state.calendarCursor = {y, m};
  const pop = document.querySelector(".sc-pop");
  if (pop) pop.innerHTML = renderCalendar();
}

function calPick(iso) {
  const p = state.calendarPick;
  if (!p.start || (p.start && p.end)) {
    /* Start new selection */
    state.calendarPick = {start: iso, end: null};
  } else {
    /* Extending: pick the second endpoint */
    if (iso < p.start) state.calendarPick = {start: iso, end: p.start};
    else state.calendarPick = {start: p.start, end: iso};
  }
  const pop = document.querySelector(".sc-pop");
  if (pop) pop.innerHTML = renderCalendar();
}

function calApply() {
  if (!state.calendarPick.start || !state.calendarPick.end) return;
  state.range = {start: state.calendarPick.start, end: state.calendarPick.end};
  state.preset = "Custom range";
  closePop();
  render();
}

/* ============================================================
   DRAWER / SETTINGS
   ============================================================ */

function openDrawer() {
  document.getElementById("drawer").classList.add("show");
  document.getElementById("scrim").classList.add("show");
}
function closeDrawer() {
  document.getElementById("drawer").classList.remove("show");
  document.getElementById("scrim").classList.remove("show");
}

function openCfg() {
  const cfg = document.getElementById("sc-cfg");
  /* Populate shop dropdown */
  const sel = document.getElementById("cfg-shop");
  sel.innerHTML = Object.keys(TIER_MAP).sort()
    .map(s => `<option value="${s}" ${s === state.shop ? 'selected' : ''}>${escapeHtml(SHOP_DISPLAY[s] || s)} (T${TIER_MAP[s]})</option>`)
    .join("");
  document.getElementById("cfg-url").value = state.sheetUrl;
  setMode(state.mode);
  cfg.classList.add("show");
}
function closeCfg() {
  document.getElementById("sc-cfg").classList.remove("show");
}
function setMode(m) {
  state.mode = m;
  document.getElementById("mode-demo").classList.toggle("active", m === "demo");
  document.getElementById("mode-live").classList.toggle("active", m === "live");
  document.getElementById("cfg-url-field").style.display = m === "live" ? "block" : "none";
}
function saveCfg() {
  state.shop = document.getElementById("cfg-shop").value;
  state.sheetUrl = document.getElementById("cfg-url").value.trim();
  /* Update "today" based on mode: live = real EST date, demo = pinned canonical date */
  state.today = state.mode === "live" ? todayInEastern() : "2026-04-19";
  try {
    localStorage.setItem("sc_cfg", JSON.stringify({
      shop: state.shop, mode: state.mode, sheetUrl: state.sheetUrl
    }));
  } catch(e) {}
  closeCfg();
  applyPreset(state.preset);
  loadData();
}
