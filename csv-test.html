<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CSV Column Test</title>
<style>
body { font-family: -apple-system, sans-serif; padding: 20px; background: #f5f5f5; }
h1 { color: #0a0a0a; }
.box { background: white; padding: 20px; border-radius: 8px; margin: 12px 0; border: 2px solid #ddd; }
.headers { background: #1a1d26; color: white; padding: 12px; border-radius: 8px; font-family: monospace; font-size: 12px; white-space: pre-wrap; }
.col-e { border-color: #dc2626; }
.col-j { border-color: #16a34a; }
.col-e h2 { color: #dc2626; }
.col-j h2 { color: #16a34a; }
table { width: 100%; border-collapse: collapse; }
td { padding: 6px 10px; border-bottom: 1px solid #eee; font-family: monospace; font-size: 13px; }
.count { color: #888; font-size: 11px; }
.big { font-size: 18px; font-weight: bold; }
</style>
</head>
<body>

<h1>CSV Column Test — E vs J</h1>
<p>This page reads the same Google Sheet CSV and displays what's in column E and column J. If they're different, we'll see it.</p>

<div class="box" id="status">Loading CSV…</div>

<div class="box">
  <h2>CSV Headers (in order)</h2>
  <div class="headers" id="headerList">…</div>
</div>

<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
  <div class="box col-e">
    <h2>Column E (index 4) <span class="count" id="eCount"></span></h2>
    <p>Header: <code id="eHeader">—</code></p>
    <table id="eTable"></table>
  </div>
  <div class="box col-j">
    <h2>Column J (index 9) <span class="count" id="jCount"></span></h2>
    <p>Header: <code id="jHeader">—</code></p>
    <table id="jTable"></table>
  </div>
</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRfGYAjMDsScyubOrpIOXsISQ-OGIqV1cBOuocxzksAw_IWS-jCL-RtQHuaGQ2ZJMKB0tOszwuysf1v/pub?gid=0&single=true&output=csv";

function parseCSV(text) {
  const rows = []; let cur='', row=[], inQ=false;
  for (let i=0;i<text.length;i++) {
    const c=text[i];
    if (inQ) {
      if (c==='"' && text[i+1]==='"') { cur+='"'; i++; }
      else if (c==='"') inQ=false;
      else cur+=c;
    } else {
      if (c==='"') inQ=true;
      else if (c===',') { row.push(cur); cur=''; }
      else if (c==='\n') { row.push(cur); rows.push(row); row=[]; cur=''; }
      else if (c==='\r') {}
      else cur+=c;
    }
  }
  if (cur.length||row.length) { row.push(cur); rows.push(row); }
  return rows.filter(r => r.some(v => String(v).trim() !== ''));
}

(async function() {
  try {
    const url = CSV_URL + '&t=' + Date.now();
    const res = await fetch(url, { cache: 'no-store' });
    const text = await res.text();
    const rows = parseCSV(text);

    document.getElementById('status').innerHTML = `<span class="big">✅ Loaded ${rows.length - 1} data rows</span> · Total columns in CSV: <b>${rows[0].length}</b>`;

    // Show headers
    const headers = rows[0];
    const headerHtml = headers.map((h, i) => `<b>[${i}] ${String.fromCharCode(65+i)}:</b> "${h}"`).join('\n');
    document.getElementById('headerList').textContent = headerHtml.replace(/<\/?b>/g, '');

    // Column E (index 4)
    document.getElementById('eHeader').textContent = `"${headers[4] || '(missing)'}"`;
    const eUnique = [...new Set(rows.slice(1).map(r => String(r[4] || '').trim()).filter(Boolean))].sort();
    document.getElementById('eCount').textContent = `${eUnique.length} unique values`;
    document.getElementById('eTable').innerHTML = eUnique.map(v => `<tr><td>${v}</td></tr>`).join('');

    // Column J (index 9)
    document.getElementById('jHeader').textContent = `"${headers[9] || '(missing)'}"`;
    const jUnique = [...new Set(rows.slice(1).map(r => String(r[9] || '').trim()).filter(Boolean))].sort();
    document.getElementById('jCount').textContent = `${jUnique.length} unique values`;
    document.getElementById('jTable').innerHTML = jUnique.map(v => `<tr><td>${v}</td></tr>`).join('');

  } catch (err) {
    document.getElementById('status').innerHTML = `❌ Error: ${err.message}`;
  }
})();
</script>

</body>
</html>
